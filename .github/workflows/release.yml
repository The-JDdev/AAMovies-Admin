name: Build & Release AAMovies Admin v7.0

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v7.0-admin)'
        required: true
        default: 'v7.0-admin'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > aamovies.keystore

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build all distribution-split release APKs
        env:
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m"
        run: |
          ./gradlew assembleRelease --max-workers 2 --no-daemon 2>&1

      - name: Collect APKs
        run: |
          mkdir -p release-apks
          for flavor in direct galaxy amazon huawei apkpure; do
            src="app/build/outputs/apk/${flavor}/release/app-${flavor}-release.apk"
            if [ -f "$src" ]; then
              label="${flavor}"
              if [ "$flavor" = "galaxy" ]; then label="samsung"; fi
              cp "$src" "release-apks/AAMovies-Admin-${{ github.event.inputs.tag }}-${label}.apk"
            fi
          done
          ls -lh release-apks/

      - name: Delete old release if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ github.event.inputs.tag }} --yes 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.event.inputs.tag }} \
            --title "AAMovies Admin ${{ github.event.inputs.tag }}" \
            --notes "## AAMovies Admin ${{ github.event.inputs.tag }}

          ### What's New in v7.0
          - Global Settings page (Telegram link, Facebook link)
          - Add Movie: banner URL, industry, rating, star cast fields
          - Download links now show resolution field
          - LIFO auto-ordering for trending/pinned entries
          - Admin drawer: Settings navigation item

          ### Distribution APKs
          - **direct** — direct download / sideload
          - **samsung** — Samsung Galaxy Store
          - **amazon** — Amazon Appstore
          - **huawei** — Huawei AppGallery
          - **apkpure** — APKPure distribution" \
            release-apks/*.apk
